<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan's Portfolio</title>
    <style>

        body, html {
            margin: 0;
            padding: 0;
            height: 300vh;
            width: 100%;
            overflow-x: hidden;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(255, 255, 255, 0.1) 0px,
                    rgba(255, 255, 255, 0.1) 1px,
                    transparent 15px,
                    transparent 20px
                ),
                radial-gradient(circle at center, #90e9f3, #6AB8C1);
            background-attachment: fixed;
        }

        /* ==================== LOGO ==================== */
        .logo {
            position: absolute;
            top: 350px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            animation: scaleout 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .logo img {
            width: 550px;
            height: auto;
        }

        @keyframes scaleout {
            from {
                transform: translateX(-50%) scale(0.8);
                opacity: 0;
            }
            to {
                transform: translateX(-50%) scale(1);
                opacity: 1;
            }
        }

        /* ==================== PROJETS ==================== */
        .projects-container {
            position: fixed;
            top: 50%;
            left: 60%;
            display: flex;
            gap: 50px;
            z-index: 15;
            transform-origin: 0px center;
            animation: scrollZoomAndPan linear both;
            animation-timeline: scroll();
            animation-range: 0px 1500px;
        }

        .windowproject {
            width: 20vh;
            height: 35vh;
            background: #ffffff;
            border-radius: 1000px 1000px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.2);
            flex-shrink: 0;
            transition: all 0.3s ease-in-out;
        }

        .windowproject:hover {
            box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.2);
            transform: translateY(-5px) translateX(-5px);
        }

        .project-content {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1000px 1000px 0 0;
        }

        @keyframes scrollZoomAndPan {
            0% {
                transform: translate(-50%, -50%) scale(8);
                opacity: 0;
                filter: blur(10px);
            }
            30% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 1;
                filter: blur(0px);
            }
            100% {
                transform: translate(-150%, -50%) scale(2);
                opacity: 1;
            }
        }

        /* ==================== NUAGES ==================== */
        .cloud {
            position: absolute;
            z-index: 1;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }

        .cloud.from-left {
            animation: 
                slideInLeft 2.5s cubic-bezier(0.22, 1, 0.36, 1) backwards,
                flottement 6s ease-in-out infinite alternate;
        }

        .cloud.from-right {
            animation: 
                slideInRight 2.5s cubic-bezier(0.22, 1, 0.36, 1) backwards,
                flottement 8s ease-in-out infinite alternate-reverse;
        }

        .cloud:nth-child(1) { animation-delay: 0.2s; }
        .cloud:nth-child(2) { animation-delay: 0.5s; }
        .cloud:nth-child(3) { animation-delay: 0.3s; }
        .cloud:nth-child(4) { animation-delay: 0.7s; }
        .cloud:nth-child(5) { animation-delay: 0.8s; }
        .cloud:nth-child(6) { animation-delay: 0.4s; }

        @keyframes slideInLeft {
            from {
                transform: translateX(-1200px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(1200px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes flottement {
            0% { margin-left: 0; }
            100% { margin-left: 50px; }
        }

        /* ==================== SOLEIL ==================== */
        .sun {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 120%;
            z-index: 5;
            animation: sunSpawn 5s ease-out forwards, sunRotate 30s linear infinite;
        }

        @keyframes sunSpawn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        @keyframes sunRotate {
            from {
                transform: translateX(-50%) rotate(45deg);
            }
            to {
                transform: translateX(-50%) rotate(405deg);
            }
        }

        /* ==================== Ville ==================== */

        .city {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            z-index: 10;
        }

        @keyframes cityUp {
            from {
                transform: translateX(-50%) translateY(600px);
            }
            to {
                transform: translateX(-50%) translateY(200px);
            }
        }

        /* ==================== FOND BLANC ==================== */
        .white-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            z-index: 12;
            pointer-events: none;
            animation: fadeToWhite linear both;
            animation-timeline: scroll();
            animation-range: 0px 800px;
        }

        @keyframes fadeToWhite {
            from { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="logo">
        <img src="PorfolioLogo.svg" alt="Logo">
    </div>

    <div class="projects-container">
        <a href="projet-portfolio.html" class="windowproject">
            <img src="bannerPorfolio.png" alt="Projet Portfolio" class="project-content">
        </a>
        <a href="projet-ashedem.html" class="windowproject">
            <img src="bannerAshedem.png" alt="Projet Ashedem" class="project-content">
        </a>
        <a href="projet-veterra.html" class="windowproject">
            <img src="bannerVeterra.png" alt="Projet Veterra" class="project-content">
        </a>
        <a href="projet-ticket.html" class="windowproject">
            <img src="bannerTicket.png" alt="Projet Ticket" class="project-content">
        </a>
        <a href="projet-maestro.html" class="windowproject">
            <img src="bannerMaestro.png" alt="Projet Maestro" class="project-content">
        </a>
    </div>

    </div>

    <img src="cloud1.png" alt="Cloud" class="cloud from-left" style="top: 250px; left: -100px; width: 1100px;">
    <img src="cloud2.png" alt="Cloud" class="cloud from-left" style="top: -100px; left: 400px; width: 500px;">
    <img src="cloud3.png" alt="Cloud" class="cloud from-right" style="top: 100px; right: -100px; width: 900px;">
    <img src="cloud4.png" alt="Cloud" class="cloud from-right" style="top: 300px; right: 0; width: 600px;">
    <img src="cloud1.png" alt="Cloud" class="cloud from-left" style="bottom: -50px; left: 100px; width: 650px;">
    <img src="cloud2.png" alt="Cloud" class="cloud from-right" style="bottom: 150px; right: 300px; width: 400px;">

    <img src="sun.png" alt="Sun" class="sun">

    <div class="white-background"></div>

    <img src="city.png" alt="City" class="city" style="animation: cityUp 2s ease-out forwards">

    <script>

        if (history.scrollRestoration) {
            history.scrollRestoration = 'manual';
        }
        window.scrollTo(0, 0);

        const clouds = document.querySelectorAll('.cloud');
        let mouseX = 0;
        let mouseY = 0;
        let currentX = 0;
        let currentY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 40;
            mouseY = (e.clientY - window.innerHeight / 2) / 40;
        });

        function animate() {
            currentX += (mouseX - currentX) * 0.05;
            currentY += (mouseY - currentY) * 0.05;

            clouds.forEach((cloud, index) => {
                const speed = (index + 1) * 0.5;
                cloud.style.transform = `translate3d(${currentX * speed}px, ${currentY * speed}px, 0)`;
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
